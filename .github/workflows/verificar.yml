name: Verificação Legislativa

on:
  schedule:
    - cron: "0 11 * * *"
    - cron: "0 15 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  verificar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Instalar dependências
        run: pip install -r requirements.txt
      - name: Executar verificação
        env:
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          NOTIF_EMAIL:        ${{ secrets.NOTIF_EMAIL }}
          NOTIF_WHATSAPP:     ${{ secrets.NOTIF_WHATSAPP }}
          EMAIL_REMETENTE:    ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
          EMAIL_SENHA_APP:    ${{ secrets.EMAIL_SENHA_APP }}
          WHATSAPP_NUMERO:    ${{ secrets.WHATSAPP_NUMERO }}
          WHATSAPP_API_KEY:   ${{ secrets.WHATSAPP_API_KEY }}
        run: python scripts/verificar.py
